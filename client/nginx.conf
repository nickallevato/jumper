map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Colyseus matchmake HTTP endpoint
  location /matchmake {
    proxy_pass http://server:2567;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Colyseus room WebSocket endpoints
  # v0.16 connects via /{processId}/{roomId}?sessionId=... (two segments);
  # earlier clients used single-segment /{roomId}. Match both.
  location ~ "^/[a-zA-Z0-9_-]{8,}(/[a-zA-Z0-9_-]+)?$" {
    proxy_pass http://server:2567;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
