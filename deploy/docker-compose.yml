services:
  app:
    image: ${IMAGE_APP:-675911353984.dkr.ecr.us-west-2.amazonaws.com/jumper-server:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3002"
      DB_PATH: /data/jumper.db
    volumes:
      - jumper-data:/data
    networks:
      - app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - app

volumes:
  caddy-config:
  caddy-data:
  jumper-data:

networks:
  app:
    driver: bridge
