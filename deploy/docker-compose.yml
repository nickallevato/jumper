services:
  server:
    image: ${IMAGE_SERVER:-675911353984.dkr.ecr.us-west-2.amazonaws.com/jumper-server:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "2567"
    networks:
      - app

  client:
    image: ${IMAGE_CLIENT:-675911353984.dkr.ecr.us-west-2.amazonaws.com/jumper-client:latest}
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - app

networks:
  app:
    driver: bridge
